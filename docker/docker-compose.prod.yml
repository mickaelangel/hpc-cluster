          memory: 4G
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "systemctl", "is-active", "sshd"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      - "com.hpc.environment=production"
      - "com.hpc.role=frontal"
      - "com.hpc.node=primary"

