version: '3.8'

# ============================================================================
# Cluster HPC - Configuration Production
# openSUSE 15.6 - Déploiement
# ============================================================================
#
# ⚠️  ATTENTION — deploy.resources (limits/reservations) :
#     Ces blocs sont pris en compte UNIQUEMENT avec Docker Swarm.
#     En "docker compose" standalone, les limites CPU/RAM ne sont PAS appliquées.
#     Pour des limites en mode compose seul, utiliser les options au niveau
#     des services (mem_limit, cpus) si nécessaire — voir doc Docker.
#
# DIFFÉRENCES AVEC docker-compose-opensource.yml :
# - Ressources limitées et garanties (effectives en Swarm uniquement)
# - Healthchecks renforcés
# - Logging structuré
# - Restart policies strictes
#
# USAGE:
#   docker compose -f docker-compose-opensource.yml -f docker-compose.prod.yml up -d
#   En prod : définir tous les secrets dans .env (pas de valeurs démo).
# ============================================================================

services:
  # ============================================
  # MONITORING STACK (Production)
  # ============================================
  
  prometheus:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=false"
      - "com.hpc.environment=production"
      - "com.hpc.monitoring=true"

  grafana:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=false"
      - "com.hpc.environment=production"
      - "com.hpc.monitoring=true"

  influxdb:
    deploy:
      resources:
        limits:
          cpus: '2'
